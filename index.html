<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Pato - Versão Definitiva</title>
    <style>
        body {
            background-color: #55b65b;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .ceu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 240px;
            background: linear-gradient(to bottom, #4a90e2, #87CEEB);
        }

        .sol {
            position: absolute;
            top: 25px;
            right: 50px;
            width: 65px;
            height: 65px;
            background-color: #FFA500;
            border-radius: 50%;
            box-shadow: 0 0 30px #FFD700;
        }

        .elemento-cenario { position: absolute; bottom: 0; border-radius: 50% 50% 0 0; }
        .arvore { background-color: #2e7d32; width: 60px; height: 90px; bottom: 240px; }
        .arbusto { background-color: #1b5e20; width: 45px; height: 35px; bottom: 240px; border-radius: 20px 20px 0 0; }

        .estrada {
            position: absolute;
            top: 240px;
            left: 0;
            width: 100vw;
            height: 180px;
            background-color: #3d3d3d;
            overflow: hidden;
            border-top: 6px solid #9e9e9e;
            border-bottom: 6px solid #9e9e9e;
        }

        .faixas {
            width: 200vw;
            height: 6px;
            position: absolute;
            top: 87px;
            border-top: 4px dashed #ffd700;
            border-bottom: 4px dashed #ffd700;
        }

        #container-moedas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .moeda-pista {
            position: absolute;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle, #ffe066, #f5b041);
            border: 2px solid #d35400;
            border-radius: 50%;
            top: 75px;
            box-shadow: 0 0 10px #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 1px #7e5109;
            animation: girarMoeda 0.6s infinite alternate ease-in-out;
        }

        @keyframes girarMoeda {
            from { transform: scaleX(1); }
            to { transform: scaleX(0.3); }
        }

        .controles {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 30;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 280px;
        }

        input, button {
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: 2px solid #cbd5e1;
            outline: none;
        }

        button {
            background-color: #2563eb;
            color: white;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }

        button:hover { background-color: #1d4ed8; }

        .placar {
            margin-top: 12px;
            font-size: 18px;
            font-weight: 800;
            color: #b7950b;
        }

        .lojinha-menu {
            margin-top: 10px;
            border-top: 1px solid #e2e8f0;
            padding-top: 8px;
            font-size: 12px;
            color: #475569;
        }
        .lojinha-menu h4 { margin: 0 0 5px 0; color: #1e293b; }
        .lojinha-menu ul { margin: 0; padding-left: 15px; }

        .balao-fala {
            position: absolute;
            background: white;
            border: 2px solid #1e293b;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            font-size: 14px;
            color: #1e293b;
            z-index: 15;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            display: block;
        }

        .balao-fala::after {
            content: ''; position: absolute; bottom: -10px; left: 30px;
            border-width: 10px 10px 0; border-style: solid; border-color: white transparent;
        }

        .pato-container {
            position: absolute;
            left: 45vw;
            top: 260px;
            width: 150px;
            height: 120px;
            z-index: 5;
        }

        #pato {
            width: 100%;
            height: auto;
            transform: scaleX(-1);
        }

        .skin-item {
            position: absolute;
            display: none;
            z-index: 10;
            pointer-events: none;
            background-size: contain;
            background-repeat: no-repeat;
            transition: left 0.2s ease, top 0.2s ease, transform 0.2s ease;
        }

        /* Chapéu (hat) */
        #skin-hat {
            position: absolute;
            display: none; /* Começa escondido */
            z-index: 10;
            pointer-events: none;

            /* Sua imagem */

background-image: url("patin.png");

            background-size: contain;
            background-repeat: no-repeat;

            /* Tamanho para cobrir o capacete */
            width: 200px;
            height: 100px;

            /* Posição exata na cabeça olhando para a DIREITA (Início do jogo) */
            top: -47px;
            left: -77px;
            motion-rotation:20deg ;



            /* scaleX(-1) vira o desenho do chapéu para a direita, rotate dá a inclinação da foto */
            transform: scaleX(-1) rotate(-25deg);
            transition: left 0.2s ease, top 0.2s ease, transform 0.2s ease;
        }
        #skin-glasses {
       background-image: url("oculos.png");

            width: 60px;
            height: 40px;
            position: absolute;
            display: none; /* Deixe assim, o JS vai ativar quando comprar */
            z-index: 10;
            pointer-events: none;
            background-size: contain;
            background-repeat: no-repeat;
            transition: left 0.2s ease, top 0.2s ease, transform 0.2s ease;
        }
        /* Capa de herói (cape) */
        #skin-cape {
            position: absolute;
            display: none; /* Começa escondido até o "buy cape" */
            z-index: 4; /* Fica um pouquinho atrás do pato para dar efeito de profundidade */
            pointer-events: none;

            /* Carrega a imagem da capa */
            background-image: url("imagens/capa.png");
            background-size: contain;
            background-repeat: no-repeat;

            /* Tamanho ideal para a capa aparecer bem */
            width: 243px;
            height: 192px;

            /* Posição inicial olhando para a DIREITA */
            top: 35px;
            left: 20px;

            transition: left 0.2s ease, top 0.2s ease, transform 0.2s ease;
    </style>
</head>
<body>

<div class="ceu"><div class="sol"></div></div>

<div class="elemento-cenario arvore" style="left: 8%;"></div>
<div class="elemento-cenario arbusto" style="left: 25%;"></div>
<div class="elemento-cenario arvore" style="left: 55%;"></div>
<div class="elemento-cenario arbusto" style="left: 75%;"></div>

<div id="balao" class="balao-fala">Olá! Digite seu nome para jogar! 🦆</div>

<div class="controles">
    <input type="text" id="comando" placeholder="Seu nome..." autocomplete="off">
    <button id="btn-enviar" onclick="processarEntrada()">Enviar</button>
    <p id="dica-comandos" style="margin: 5px 0 0 0; font-size: 11px; color: #64748b;">Aguardando início...</p>

    <div class="placar">🪙 Pontos: <span id="moedas">0</span></div>

    <div class="lojinha-menu">
        <h4>🛒 Lojinha de Skins (Use em inglês):</h4>
        <ul>
            <li><b>buy hat</b> - Custa 15 pts</li>
            <li><b>buy glasses</b> - Custa 25 pts</li>
            <li><b>buy cape</b> - Custa 40 pts</li>
        </ul>
    </div>
</div>

<div class="estrada">
    <div id="faixas-pista" class="faixas"></div>
    <div id="container-moedas"></div>
</div>

<div id="pato-box" class="pato-container">
    <div id="skin-hat" class="skin-item"></div>
    <div id="skin-glasses" class="skin-item"></div>
    <div id="skin-cape" class="skin-item"></div>
    <img src="pato.png" id="pato" alt="Pato Motorista">
</div>

<script>
    let posicaoEstrada = 0;
    let pontuacaoTotal = 0;
    let faseDoJogo = "perguntando_nome";
    let listaMoedas = [];
    let olhandoDireita = true;
    let moedasCriadasNoX = new Set();

    const patoBox = document.getElementById("pato-box");
    const imgPato = document.getElementById("pato");
    const balao = document.getElementById("balao");
    const campoTexto = document.getElementById("comando");
    const dicaComandos = document.getElementById("dica-comandos");
    const placarMoedas = document.getElementById("moedas");
    const faixasPista = document.getElementById("faixas-pista");
    const containerMoedas = document.getElementById("container-moedas");

    const sHat = document.getElementById("skin-hat");
    const sGlasses = document.getElementById("skin-glasses");
    const sCape = document.getElementById("skin-cape");

    function tocarSomMoeda() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.12);
        } catch (e) {}
    }

    function tocarSomCompra() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } catch (e) {}
    }

    function atualizarBalao() {
        const rect = patoBox.getBoundingClientRect();
        balao.style.left = (rect.left + 15) + "px";
        balao.style.top = (rect.top - 68) + "px";
    }

    window.onload = () => {
        olhandoDireita = true;
        imgPato.style.transform = "scaleX(-1)";
        gerarMoedasIniciais();
        ajustarPosicaoAcessorios();
        balao.style.display = "block";
        atualizarBalao();
        campoTexto.focus();
    };

    function ajustarPosicaoAcessorios() {
        if (olhandoDireita) {
            sHat.style.left = "-77px";
            sHat.style.top = "-47px";
            sHat.style.transform = "scaleX(-1) rotate(-25deg)";
            sGlasses.style.left = "5px";
            sGlasses.style.top = "-20px";
            sGlasses.style.transform = "scaleX(1) rotate(-25deg)";
            sCape.style.left = "20px";
            sCape.style.top = "35px";
            sCape.style.transform = "scaleX(1) rotate(0deg)";
        } else {
            sHat.style.left = "50px";
            sHat.style.top = "-47px";
            sHat.style.transform = "scaleX(1) rotate(25deg)";
            sGlasses.style.left = "5px";
            sGlasses.style.top = "-20px";
            sGlasses.style.transform = "scaleX(-1) rotate(25deg)";
            sCape.style.left = "20px";
            sCape.style.top = "35px";
            sCape.style.transform = "scaleX(-1) rotate(0deg)";
        }
    }

    function gerarMoedasIniciais() {
        containerMoedas.innerHTML = "";
        listaMoedas = [];
        moedasCriadasNoX.clear();
        const centroTela = window.innerWidth / 2;
        for (let i = -25; i <= 25; i++) {
            if (i === 0) continue;
            let xGlobal = i * 140;
            criarMoedaNoMundo(xGlobal, centroTela);
        }
    }

    function criarMoedaNoMundo(xGlobal, centroTela) {
        if (moedasCriadasNoX.has(xGlobal)) return;
        let divMoeda = document.createElement("div");
        divMoeda.className = "moeda-pista";
        let xTela = centroTela + xGlobal + posicaoEstrada;
        divMoeda.style.left = xTela + "px";
        divMoeda.innerText = "$";
        containerMoedas.appendChild(divMoeda);
        listaMoedas.push({ element: divMoeda, xGlobal: xGlobal, ativa: true });
        moedasCriadasNoX.add(xGlobal);
    }

    function garantizarMoedasNoCaminho() {
        const centroTela = window.innerWidth / 2;
        let passoAtual = Math.round(-posicaoEstrada / 140);
        for (let i = passoAtual - 25; i <= passoAtual + 25; i++) {
            if (i === 0) continue;
            let xGlobal = i * 140;
            criarMoedaNoMundo(xGlobal, centroTela);
        }
    }

    function processarEntrada() {
        const valorInput = campoTexto.value.trim();
        if (valorInput === "") return;

        if (faseDoJogo === "perguntando_nome") {
            faseDoJogo = "jogando";
            balao.innerHTML = `Boa, ${valorInput}! Pilote e junte pontos para a Lojinha! 🛒`;
            campoTexto.placeholder = "Ex: right 3, buy hat...";
            dicaComandos.innerHTML = "Mova: <b>right/left [passos]</b> | Compre: <b>buy [skin]</b>";
            campoTexto.value = "";
            campoTexto.focus();
            atualizarBalao();
            return;
        }

        if (faseDoJogo === "jogando") {
            const textoMinusculo = valorInput.toLowerCase();

            if (textoMinusculo.startsWith("buy ")) {
                const item = textoMinusculo.substring(4);
                if (item === "hat") {
                    if (pontuacaoTotal >= 15) {
                        pontuacaoTotal -= 15; placarMoedas.innerHTML = pontuacaoTotal;
                        sHat.style.display = "block"; balao.innerHTML = "Chapéu comprado! 👒"; tocarSomCompra();
                    } else { balao.innerHTML = "Pontos insuficientes para o 'hat'! ❌"; }
                }
                else if (item === "glasses") {
                    if (pontuacaoTotal >= 25) {
                        pontuacaoTotal -= 25; placarMoedas.innerHTML = pontuacaoTotal;
                        sGlasses.style.display = "block"; balao.innerHTML = "Óculos escuros equipados! 😎"; tocarSomCompra();
                    } else { balao.innerHTML = "Pontos insuficientes para o 'glasses'! ❌"; }
                }
                else if (item === "cape") {
                    if (pontuacaoTotal >= 40) {
                        pontuacaoTotal -= 40; placarMoedas.innerHTML = pontuacaoTotal;
                        sCape.style.display = "block"; balao.innerHTML = "Capa maneira ativada! 🦸‍♂️"; tocarSomCompra();
                    } else { balao.innerHTML = "Pontos insuficientes para a 'cape'! ❌"; }
                }
                campoTexto.value = ""; campoTexto.focus(); return;
            }

            const partes = textoMinusculo.split(" ");
            const cmd = partes[0];
            let passos = parseInt(partes[1]);
            if (isNaN(passos) || passos <= 0) passos = 1;

            let deslocamentoTotal = passos * 100;
            let direcaoMovimento = 0;

            if (cmd === "right") {
                olhandoDireita = true; imgPato.style.transform = "scaleX(-1)"; direcaoMovimento = -deslocamentoTotal;
                balao.innerHTML = `Andando ${passos} passos para a direita! 💨`;
            }
            else if (cmd === "left") {
                olhandoDireita = false; imgPato.style.transform = "scaleX(1)"; direcaoMovimento = deslocamentoTotal;
                balao.innerHTML = `Voltando ${passos} passos para a esquerda! 🧭`;
            }
            else if (cmd === "back") {
                direcaoMovimento = olhandoDireita ? deslocamentoTotal : -deslocamentoTotal;
                balao.innerHTML = `Dando ré por ${passos} passos! ⚠️`;
            }

            ajustarPosicaoAcessorios();
            posicaoEstrada += direcaoMovimento;
            faixasPista.style.transform = `translateX(${posicaoEstrada % 100}px)`;

            garantizarMoedasNoCaminho();

            const rectPato = patoBox.getBoundingClientRect();
            const centroPatoX = rectPato.left + (rectPato.width / 2);
            const centroTela = window.innerWidth / 2;

            listaMoedas.forEach(moeda => {
                let xVisual = centroTela + moeda.xGlobal + posicaoEstrada;
                moeda.element.style.left = xVisual + "px";
                if (!moeda.ativa) return;

                if (xVisual >= centroPatoX - 60 && xVisual <= centroPatoX + 60) {
                    moeda.ativa = false;
                    moeda.element.style.display = "none";
                    pontuacaoTotal += 5;
                    placarMoedas.innerHTML = pontuacaoTotal;
                    tocarSomMoeda();
                }
            });
            atualizarBalao();
        }
        campoTexto.value = "";
        campoTexto.focus();
    }

    // ATIVA O ENTER E O CÓDIGO SECRETO "23e"
    setTimeout(() => {
        const campoDefinitivo = document.getElementById("comando");
        if (campoDefinitivo) {
            campoDefinitivo.onkeydown = function(event) {
                // Se apertar Enter, processa o comando normal ou o cheat
                if (event.key === "Enter") {
                    event.preventDefault();

                    // SEGREDO: Se digitar "23e" e der Enter, ganha 50 moedas!
                    if (campoDefinitivo.value.trim() === "23e") {
                        pontuacaoTotal += 50;
                        placarMoedas.innerHTML = pontuacaoTotal;
                        balao.innerHTML = "Código secreto ativado! +50 moedas! 🪙✨";
                        tocarSomCompra(); // Faz o barulhinho de sucesso
                        campoDefinitivo.value = "";
                        campoDefinitivo.focus();
                        return; // Para o código aqui e não tenta mover o pato
                    }

                    // Se não for o cheat, roda o jogo normal
                    processarEntrada();
                }
            };
        }
    }, 500);

    window.addEventListener("resize", atualizarBalao);
</script>
</body>
</html>
